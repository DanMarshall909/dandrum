metadata:
  name: Control Mixer Modulation
  version: "0.1"
render:
  sample_rate_hz: 48000
  block_size_frames: 128
  duration_frames: 48000
modules:
  - id: env
    type: adsr
    outputs:
      - name: value
        signal_type: control
  - id: lfo
    type: lfo
    outputs:
      - name: value
        signal_type: control
  - id: control_mix
    type: control_mixer
    inputs:
      - name: inputs
        signal_type: control
    outputs:
      - name: sum
        signal_type: control
  - id: vca
    type: gain
    inputs:
      - name: audio_in
        signal_type: audio
      - name: gain
        signal_type: control
    outputs:
      - name: audio_out
        signal_type: audio
  - id: osc
    type: oscillator
    outputs:
      - name: audio
        signal_type: audio
  - id: out
    type: audio_output
    inputs:
      - name: left
        signal_type: audio
connections:
  - from: env.value
    to: control_mix.inputs
  - from: lfo.value
    to: control_mix.inputs
  - from: control_mix.sum
    to: vca.gain
  - from: osc.audio
    to: vca.audio_in
  - from: vca.audio_out
    to: out.left
