metadata:
  name: Composite Echo
  version: "0.1"
render:
  sample_rate_hz: 48000
  block_size_frames: 128
  duration_frames: 96000
module_definitions:
  - type: delay_echo
    inputs:
      - name: audio_in_l
        signal_type: audio
        maps_to:
          - echo.audio_in_l
      - name: audio_in_r
        signal_type: audio
        maps_to:
          - echo.audio_in_r
      - name: time_left_ms
        signal_type: control
        maps_to:
          - echo.time_left_ms
      - name: time_right_ms
        signal_type: control
        maps_to:
          - echo.time_right_ms
      - name: feedback
        signal_type: control
        maps_to:
          - echo.feedback
      - name: damping_cutoff
        signal_type: control
        maps_to:
          - echo.damping_cutoff
      - name: wet
        signal_type: control
        maps_to:
          - echo.wet
      - name: dry
        signal_type: control
        maps_to:
          - echo.dry
    outputs:
      - name: audio_out_l
        signal_type: audio
        maps_from:
          - echo.audio_out_l
      - name: audio_out_r
        signal_type: audio
        maps_from:
          - echo.audio_out_r
    modules:
      - id: echo
        type: echo
    connections: []
modules:
  - id: midi
    type: midi_input
  - id: note_rate
    type: note_to_rate
  - id: osc
    type: oscillator
  - id: envelope
    type: adsr
  - id: vca
    type: gain
  - id: mixer
    type: audio_mixer
  - id: delay
    type: delay_echo
  - id: out
    type: audio_output
connections:
  - from: midi.events
    to: note_rate.events
  - from: midi.events
    to: envelope.gate
  - from: note_rate.rate
    to: osc.pitch
  - from: osc.audio
    to: vca.audio_in
  - from: envelope.value
    to: vca.gain
  - from: vca.audio_out
    to: mixer.inputs
  - from: mixer.mix
    to: delay.audio_in_l
  - from: mixer.mix
    to: delay.audio_in_r
  - from: delay.audio_out_l
    to: out.left
  - from: delay.audio_out_r
    to: out.right
