metadata:
  name: Polyphonic Chords
voice_allocation:
  max_voices: 6
  stealing: disabled
render:
  sample_rate_hz: 48000
  block_size_frames: 128
  duration_frames: 192000
modules:
  - id: midi
    type: midi_input
    outputs:
      - name: events
        signal_type: event
  - id: note_rate
    type: note_to_rate
    inputs:
      - name: events
        signal_type: event
    outputs:
      - name: rate
        signal_type: control
  - id: osc
    type: oscillator
    outputs:
      - name: audio
        signal_type: audio
    inputs:
      - name: pitch
        signal_type: control
  - id: envelope
    type: adsr
    inputs:
      - name: gate
        signal_type: event
    outputs:
      - name: value
        signal_type: control
  - id: vca
    type: gain
    inputs:
      - name: audio_in
        signal_type: audio
      - name: gain
        signal_type: control
    outputs:
      - name: audio_out
        signal_type: audio
  - id: mixer
    type: audio_mixer
  - id: out
    type: audio_output
    inputs:
      - name: left
        signal_type: audio
      - name: right
        signal_type: audio
connections:
  - from: midi.events
    to: note_rate.events
  - from: midi.events
    to: envelope.gate
  - from: note_rate.rate
    to: osc.pitch
  - from: osc.audio
    to: vca.audio_in
  - from: envelope.value
    to: vca.gain
  - from: vca.audio_out
    to: mixer.inputs
  - from: mixer.mix
    to: out.left
