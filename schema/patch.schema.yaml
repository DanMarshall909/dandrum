$schema: https://json-schema.org/draft/2020-12/schema
$id: https://dandrum.local/schema/patch.schema.yaml
# Editor-facing shape validation for the patch document.
# Runtime graph and DSP semantics still live in Rust.
title: Dandrum Patch Schema
type: object
required:
  - metadata
  - render
  - modules
additionalProperties: false
properties:
  # Human-facing patch identity. Only the name is required; version and author are optional.
  metadata:
    $ref: "#/$defs/metadata"
  # Render settings are the minimum runtime configuration needed to render or validate a patch.
  render:
    $ref: "#/$defs/renderSettings"
  # Assets are optional and are currently used for sample and script resource references.
  assets:
    type: array
    items:
      $ref: "#/$defs/assetDeclaration"
  # Composite module definitions live beside the patch so a single file can describe reusable subgraphs.
  module_definitions:
    type: array
    items:
      $ref: "#/$defs/moduleDefinitionDeclaration"
  # Modules are the actual runtime graph nodes. This array must not be empty.
  modules:
    type: array
    minItems: 1
    items:
      $ref: "#/$defs/moduleDeclaration"
  # Connections wire named source ports to named destination ports.
  connections:
    type: array
    items:
      $ref: "#/$defs/connectionDeclaration"
  # Voice allocation controls polyphony and stealing policy. Omitted fields fall back to the engine default.
  voice_allocation:
    $ref: "#/$defs/voiceAllocation"
$defs:
  # Top-level metadata is intentionally small; behavior is validated separately.
  metadata:
    type: object
    required:
      - name
    additionalProperties: false
    properties:
      name:
        type: string
        minLength: 1
      version:
        type: string
        minLength: 1
      author:
        type: string
        minLength: 1
  renderSettings:
    type: object
    required:
      - sample_rate_hz
      - block_size_frames
      - duration_frames
    additionalProperties: false
    properties:
      sample_rate_hz:
        type: integer
        minimum: 1
      block_size_frames:
        type: integer
        minimum: 1
      duration_frames:
        type: integer
        minimum: 1
  # Asset declarations are deliberately generic: the engine decides how each kind is loaded.
  assetDeclaration:
    type: object
    required:
      - id
      - kind
      - path
    additionalProperties: false
    properties:
      id:
        type: string
        minLength: 1
      kind:
        type: string
        enum:
          - sample
          - script
      path:
        type: string
        minLength: 1
  # Named ports are the public contract for both modules and composite definitions.
  portDeclaration:
    type: object
    required:
      - name
      - signal_type
    additionalProperties: false
    properties:
      name:
        type: string
        minLength: 1
      signal_type:
        type: string
        enum:
          - audio
          - control
          - event
  # Connection endpoints are module-relative: module_id.port_name.
  portReference:
    type: object
    required:
      - module_id
      - port_name
    additionalProperties: false
    properties:
      module_id:
        type: string
        minLength: 1
      port_name:
        type: string
        minLength: 1
  # Connections are explicit and directional; the validator checks port existence and compatibility later.
  connectionDeclaration:
    type: object
    required:
      - from
      - to
    additionalProperties: false
    properties:
      from:
        $ref: "#/$defs/portReference"
      to:
        $ref: "#/$defs/portReference"
  # Parameter values are intentionally simple so YAML authors can use scalars without ceremony.
  parameterValue:
    oneOf:
      - type: boolean
      - type: number
      - type: string
  # Module declarations describe runtime nodes. Parameters are name/value pairs keyed by module-specific meaning.
  moduleDeclaration:
    type: object
    required:
      - id
      - type
    additionalProperties: false
    properties:
      id:
        type: string
        minLength: 1
      type:
        type: string
        minLength: 1
      inputs:
        type: array
        items:
          $ref: "#/$defs/portDeclaration"
      outputs:
        type: array
        items:
          $ref: "#/$defs/portDeclaration"
      parameters:
        type: object
        additionalProperties:
          $ref: "#/$defs/parameterValue"
  # Composite definitions use the same YAML file format, but map public ports to internal graph ports.
  compositeInputDeclaration:
    type: object
    required:
      - name
      - signal_type
    additionalProperties: false
    properties:
      name:
        type: string
        minLength: 1
      signal_type:
        type: string
        enum:
          - audio
          - control
          - event
      maps_to:
        type: array
        items:
          $ref: "#/$defs/portReference"
  # Composite outputs map one public output to one or more internal outputs.
  compositeOutputDeclaration:
    type: object
    required:
      - name
      - signal_type
    additionalProperties: false
    properties:
      name:
        type: string
        minLength: 1
      signal_type:
        type: string
        enum:
          - audio
          - control
          - event
      maps_from:
        type: array
        items:
          $ref: "#/$defs/portReference"
  # Composite parameter bindings let a parent patch drive internal module parameters.
  compositeBindingDeclaration:
    type: object
    required:
      - name
    additionalProperties: false
    properties:
      name:
        type: string
        minLength: 1
      maps_to:
        type: array
        items:
          $ref: "#/$defs/portReference"
  # A composite module definition is a reusable subgraph with public ports, bindings, nested modules, and local connections.
  moduleDefinitionDeclaration:
    type: object
    required:
      - type
    additionalProperties: false
    properties:
      type:
        type: string
        minLength: 1
      inputs:
        type: array
        items:
          $ref: "#/$defs/compositeInputDeclaration"
      outputs:
        type: array
        items:
          $ref: "#/$defs/compositeOutputDeclaration"
      parameters:
        type: array
        items:
          $ref: "#/$defs/compositeBindingDeclaration"
      asset_bindings:
        type: array
        items:
          $ref: "#/$defs/compositeBindingDeclaration"
      modules:
        type: array
        items:
          $ref: "#/$defs/moduleDeclaration"
      connections:
        type: array
        items:
          $ref: "#/$defs/connectionDeclaration"
  # Polyphony is optional, but if specified the engine requires a positive voice count.
  voiceAllocation:
    type: object
    required:
      - max_voices
    additionalProperties: false
    properties:
      max_voices:
        type: integer
        minimum: 1
      stealing:
        type: string
        enum:
          - disabled
          - oldest_active
